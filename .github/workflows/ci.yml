name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: todouss_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/todouss_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/todouss_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/todouss_test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:generate

      - name: Sync Prisma schema (test DB)
        working-directory: packages/db
        run: pnpm exec prisma db push --skip-generate

      - run: pnpm test

      - run: pnpm typecheck
